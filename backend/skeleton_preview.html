<!DOCTYPE html>
<html>
<head>
    <title>Skeleton Preview</title>
    <style>
        body { background: #111; color: #fff; font-family: Arial; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; max-width: 1200px; margin: 0 auto; }
        .frame { background: #222; border-radius: 8px; padding: 10px; }
        .frame img { width: 100%; image-rendering: pixelated; }
        .frame h3 { margin: 5px 0; font-size: 14px; }
        h1 { color: #ff69b4; }
    </style>
</head>
<body>
    <h1>Walk Cycle Skeleton Review</h1>
    <p>All 12 frames - review and let me know what needs to change</p>
    <div class="grid">

        <div class="frame"><h3>F1</h3><img src="output/ref_skeletons/walk_front_01.png"></div>
        <div class="frame"><h3>F2</h3><img src="output/ref_skeletons/walk_front_02.png"></div>
        <div class="frame"><h3>F3 - Passing</h3><img src="output/ref_skeletons/walk_front_03.png"></div>
        <div class="frame"><h3>F4</h3><img src="output/ref_skeletons/walk_front_04.png"></div>
        <div class="frame"><h3>F5</h3><img src="output/ref_skeletons/walk_front_05.png"></div>
        <div class="frame"><h3>F6 - Contact R</h3><img src="output/ref_skeletons/walk_front_06.png"></div>
        <div class="frame"><h3>F7</h3><img src="output/ref_skeletons/walk_front_07.png"></div>
        <div class="frame"><h3>F8</h3><img src="output/ref_skeletons/walk_front_08.png"></div>
        <div class="frame"><h3>F9 - Passing</h3><img src="output/ref_skeletons/walk_front_09.png"></div>
        <div class="frame"><h3>F10</h3><img src="output/ref_skeletons/walk_front_10.png"></div>
        <div class="frame"><h3>F11</h3><img src="output/ref_skeletons/walk_front_11.png"></div>
    </div>
</body>
</html>
